<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mechvibes</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <link rel="shortcut icon" type="image/png" href="../../assets/icon.png" />
    <script>
      (function(){var t=new URLSearchParams(location.search).get('theme')||localStorage.getItem('mechvibes-theme');var d=t==='dark'||(t!=='light'&&window.matchMedia('(prefers-color-scheme: dark)').matches);if(d){document.documentElement.classList.add('dark');document.documentElement.style.backgroundColor='#1a1a1a';}else{document.documentElement.style.backgroundColor='#ffffff';}})();
    </script>
  </head>
  <body class="m-0 p-0 overflow-hidden bg-white dark:bg-[#1a1a1a] font-sans text-[13px]">
    <div id="app-root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
